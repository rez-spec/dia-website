<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>DiA Residential — Design-Itude Associates</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Design-Itude Associates — bespoke residential architecture & interiors. London · Kent · Cairo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ===== PRINT ===== */
    @page { size: A4 portrait; margin: 10mm; }
    html, body {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }

    /* On-screen preview before print */
    body { background: var(--c-bg); }

    /* Print uses the bright (white) logo in the footer */
    .foot-logo img { content: url("assets/logo-white.png"); }

    @media print {
      /* Force colored backgrounds to render */
      *, *::before, *::after {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        animation: none !important;
        transition: none !important;
      }

      /* Hide all floating chrome */
      .nav,
      .rail,
      .btt,
      #dia-tweaks,
      .menu-overlay,
      .lightbox { display: none !important; }

      /* Make every fade-up visible — no scroll observer in print */
      .fade-up { opacity: 1 !important; transform: none !important; }

      /* Hero: use natural sized block, not 100vh */
      .hero {
        height: auto !important;
        min-height: 0 !important;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      .hero-bg, .hero-bg img { position: static !important; height: 480px !important; width: 100% !important; object-fit: cover !important; }
      .hero-bg::after { display: none !important; }
      .hero-content {
        position: static !important;
        padding: 24px var(--pad-x) !important;
        background: var(--c-bg);
      }

      /* Detail hero same treatment */
      .detail-hero { height: auto !important; min-height: 0 !important; }

      /* Sections: don't crash into page boundary in the middle of a card */
      .section { padding: 28px var(--pad-x) !important; page-break-inside: avoid; break-inside: avoid; }
      .card,
      .why-card,
      .stats-card,
      .svc,
      .work,
      .foot-card {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      /* New page before big landmark sections so they breathe */
      #services,
      #work,
      #contact,
      .foot {
        page-break-before: auto;
      }

      /* Reduce fixed positions */
      .img-placeholder::after { display: none !important; }

      /* Page background colored even without backgrounds set on html */
      html, body, main { background: var(--c-bg) !important; }

      /* Footer should stay together */
      .foot, .foot-card, .foot-strip { page-break-inside: avoid; break-inside: avoid; }

      /* Shrink overly tall image cards for paged flow */
      .work-img { aspect-ratio: auto !important; max-height: 240px; overflow: hidden; }
      .about-img { max-height: 520px; overflow: hidden; }
      .bento { grid-auto-rows: 140px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react" src="tweaks-panel.jsx"></script>
  <script src="data.js"></script>
  <script type="text/babel" data-presets="react" src="ui.jsx"></script>
  <script type="text/babel" data-presets="react" src="pages.jsx"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>

  <script type="text/babel" data-presets="react">
    // Auto-print after fonts + Babel + React mount + images
    (async () => {
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
      // wait for React app
      const ready = () => document.querySelector("#root .foot");
      let tries = 0;
      while (!ready() && tries < 60) { await new Promise(r => setTimeout(r, 200)); tries++; }
      // wait for images to settle (best-effort)
      const imgs = Array.from(document.images);
      await Promise.all(imgs.map(i => i.complete ? null : new Promise(r => { i.addEventListener("load", r, { once: true }); i.addEventListener("error", r, { once: true }); })));
      await new Promise(r => setTimeout(r, 800));
      window.print();
    })();
  </script>
</body>
</html>
